<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Elite Fitness Gym</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header>
    <h1>Elite Fitness Gym</h1>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="classes.html">Classes</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

    <section>
        <h2>Contact Us</h2>

        <form>

            <label for="name">Name</label>
            <input type="text" id="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="message">Message</label>
            <textarea id="message" rows="5" required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>
    </section>

    <section>
        <h2>Opening Hours</h2>

        <ul>
            <li>Monday - Friday: 06:00 - 22:00</li>
            <li>Saturday: 08:00 - 20:00</li>
            <li>Sunday: 08:00 - 18:00</li>
        </ul>
    </section>

    <section>
        <h2>Find Us</h2>

        <iframe
            src="https://www.google.com/maps?q=Luton&output=embed"
            width="100%"
            height="300"
            style="border:0;"
            allowfullscreen=""
            loading="lazy">
        </iframe>

    </section>

    <section>
        <h2>Follow Us</h2>

        <a href="https://www.instagram.com"
           target="_blank">
           Instagram
        </a>

        <br><br>

        <a href="https://www.facebook.com"
           target="_blank">
           Facebook
        </a>
    </section>

</main>

<footer>
    <p>&copy; 2026 Elite Fitness Gym</p>
</footer>

<script src="assets/js/script.js"></script>

</body>
</html>
